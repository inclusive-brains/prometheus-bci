graphs:

# Fake EEG Data + Metric calculation graph
  - id: EEG
    nodes:
    - id: sub_eeg
      module: timeflux.nodes.zmq
      class: Sub
      params:
        topics: [eeg_filtered]
    - id: window
      module: timeflux.nodes.window
      class: Slide
      params:
        length: 10
        step: 1
    - id: cognitiveload
      module: nodes.eeg.ratio
      class: Ratio
      params:
        a: ["^A*F|T", [4, 8]]
        b: ["^O*P|T", [8, 12]]
        metric: eeg_cognitive_load
    - id: attention
      module: nodes.eeg.ratio
      class: Ratio
      params:
        a: ["[A-Z]*[0-9]", [12, 22]]
        b: ["[A-Z]*[0-9]", [8, 13]]
        metric: eeg_attention
    - id: stress
      module: nodes.eeg.ratio
      class: Ratio
      params:
        a: ["^A*F|T", [22, 30]]
        b: ["^A*F|T", [8, 13]]
        metric: eeg_stress
    - id: arousal
      module: nodes.eeg.ratio
      class: Ratio
      params:
        a: ["[A-Z]*[0-9]", [8, 12]]
        b: ["[A-Z]*[0-9]", [13, 30]]
        metric: eeg_arousal
    - id: event_to_signal_cog_load
      module: timeflux.nodes.events
      class: EventToSignal
      params:
        label: 'eeg_cognitive_load'
        keys: null
    - id: event_to_signal_attention
      module: timeflux.nodes.events
      class: EventToSignal
      params:
        label: 'eeg_attention'
        keys: null
    - id: event_to_signal_stress
      module: timeflux.nodes.events
      class: EventToSignal
      params:
        label: 'eeg_stress'
        keys: null
    - id: event_to_signal_arousal
      module: timeflux.nodes.events
      class: EventToSignal
      params:
        label: 'eeg_arousal'
        keys: null
    - id: pub_cognitiveload
      module: timeflux.nodes.zmq
      class: Pub
      params:
        topic: eeg_cognitiveload_metric
    - id: pub_attention
      module: timeflux.nodes.zmq
      class: Pub
      params:
        topic: eeg_attention_metric
    - id: pub_stress
      module: timeflux.nodes.zmq
      class: Pub
      params:
        topic: eeg_stress_metric
    - id: pub_arousal
      module: timeflux.nodes.zmq
      class: Pub
      params:
        topic: eeg_arousal_metric
    - id: display
      module: timeflux.nodes.debug
      class: Display
    - id: pub_eeg
      module: timeflux.nodes.zmq
      class: Pub
      params:
        topic: raw
    edges:
      - source: sub_eeg:eeg_filtered
        target: window
      - source: window
        target: cognitiveload
      - source: cognitiveload
        target: event_to_signal_cog_load
      - source: event_to_signal_cog_load
        target: pub_cognitiveload
      - source: window
        target: attention
      - source: attention
        target: event_to_signal_attention
      - source: event_to_signal_attention
        target: pub_attention
      - source: window
        target: stress
      - source: stress
        target: event_to_signal_stress
      - source: event_to_signal_stress
        target: pub_stress
      - source: window
        target: arousal
      - source: arousal
        target: event_to_signal_arousal
      - source: event_to_signal_arousal
        target: pub_arousal
    rate: 10

# Fake EEG Data + Metric calculation graph
  - id: EEG_motor
    nodes:
    - id: sub_eeg
      module: timeflux.nodes.zmq
      class: Sub
      params:
        topics: [eeg_filtered]
    - id: window
      module: timeflux.nodes.window
      class: Slide
      params:
        length: 10
        step: 1
    - id: eeg_motor_mu_theta
      module: nodes.eeg.ratio
      class: Ratio
      params:
        a: ["^C*P*O|T", [8, 14]]
        b: ["^C*P*O|T", [4, 8]]
        metric: eeg_motor_mu_theta
    - id: eeg_motor_low_beta_alpha
      module: nodes.eeg.ratio
      class: Ratio
      params:
        a: ["^C*P*O|T", [13, 22]]
        b: ["^C*P*O|T", [8, 13]]
        metric: eeg_motor_low_beta_alpha
    - id: eeg_motor_gamma_alpha
      module: nodes.eeg.ratio
      class: Ratio
      params:
        a: ["[A-Z]*[0-9]", [30, 50]]
        b: ["[A-Z]*[0-9]", [8, 13]]
        metric: eeg_motor_gamma_alpha
    - id: event_to_signal_eeg_motor_mu_theta
      module: timeflux.nodes.events
      class: EventToSignal
      params:
        label: 'eeg_motor_mu_theta'
        keys: null
    - id: event_to_signal_eeg_motor_mu_mu
      module: timeflux.nodes.events
      class: EventToSignal
      params:
        label: 'eeg_motor_mu_mu'
        keys: null
    - id: event_to_signal_eeg_motor_low_beta_alpha
      module: timeflux.nodes.events
      class: EventToSignal
      params:
        label: 'eeg_motor_low_beta_alpha'
        keys: null
    - id: event_to_signal_eeg_motor_gamma_alpha
      module: timeflux.nodes.events
      class: EventToSignal
      params:
        label: 'eeg_motor_gamma_alpha'
        keys: null
    - id: pub_eeg_motor_mu_theta
      module: timeflux.nodes.zmq
      class: Pub
      params:
        topic: eeg_motor_mu_theta
    - id: pub_eeg_motor_low_beta_alpha
      module: timeflux.nodes.zmq
      class: Pub
      params:
        topic: eeg_motor_low_beta_alpha
    - id: pub_eeg_motor_gamma_alpha
      module: timeflux.nodes.zmq
      class: Pub
      params:
        topic: eeg_motor_gamma_alpha
    edges:
      - source: sub_eeg:eeg_filtered
        target: window
      - source: window
        target: eeg_motor_mu_theta
      - source: eeg_motor_mu_theta
        target: event_to_signal_eeg_motor_mu_theta
      - source: event_to_signal_eeg_motor_mu_theta
        target: pub_eeg_motor_mu_theta
      - source: window
        target: eeg_motor_low_beta_alpha
      - source: eeg_motor_low_beta_alpha
        target: event_to_signal_eeg_motor_low_beta_alpha
      - source: event_to_signal_eeg_motor_low_beta_alpha
        target: pub_eeg_motor_low_beta_alpha
      - source: window
        target: eeg_motor_gamma_alpha
      - source: eeg_motor_gamma_alpha
        target: event_to_signal_eeg_motor_gamma_alpha
      - source: event_to_signal_eeg_motor_gamma_alpha
        target: pub_eeg_motor_gamma_alpha
    rate: 10
