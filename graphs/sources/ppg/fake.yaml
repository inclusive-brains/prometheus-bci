graphs:

  # Simulated PPG — realistic waveform with periodic peaks for HRV metrics
  - id: PPG
    nodes:
      - id: ppg_sim
        module: nodes.physio.ppg
        class: PPGSimulator
        params:
          heart_rate: 70
          hrv_std: 0.04
          sampling_rate: 25
          chunk_duration: 0.2
      - id: eda_simulation_node
        module: nodes.physio.ppg
        class: EDASimulator
      - id: ecg_simulation_node
        module: nodes.physio.ppg
        class: ECGSimulator
      - id: pub_filtered
        module: timeflux.nodes.zmq
        class: Pub
        params:
            topic: ppg_filtered
      - id: pub_raw
        module: timeflux.nodes.zmq
        class: Pub
        params:
            topic: ppg_raw
      - id: pub_eda
        module: timeflux.nodes.zmq
        class: Pub
        params:
            topic: eda_raw
      - id: pub_temperature
        module: timeflux.nodes.zmq
        class: Pub
        params:
            topic: temperature_raw
      - id: pub_hr
        module: timeflux.nodes.zmq
        class: Pub
        params:
            topic: hr_data
    edges:
      - source: ppg_sim
        target: pub_filtered
      - source: ppg_sim
        target: pub_raw
      - source: ppg_sim
        target: pub_eda
      - source: ppg_sim
        target: pub_hr
      - source: ppg_sim
        target: pub_temperature
