<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prometheus BCI — Robotic Arm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="assets/css/shared.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.181.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.181.0/examples/jsm/",
            "mujoco_wasm": "https://unpkg.com/mujoco-js@0.0.7/dist/mujoco_wasm.js"
        }
    }
    </script>
    <script type="module" src="assets/js/app.js"></script>
    <script src="assets/js/nav-sidebar.js"></script>
</head>
<body>

<div class="app-layout">
    <nav-sidebar active="/robotic_arm"></nav-sidebar>

    <!-- Main content -->
    <main class="main-content">
        <!-- 3D Robot fills the entire main area -->
        <div id="robot3dContainer">
            <div id="robotLoadingOverlay">
                <div class="spinner"></div>
                <span id="robotLoadingText">Initializing physics engine...</span>
            </div>
        </div>

        <!-- Floating controls -->
        <div class="floating-controls">
            <button class="ctrl-btn up" id="btnUp">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
                Up
            </button>
            <button class="ctrl-btn down" id="btnDown">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>
                Down
            </button>
            <button class="ctrl-btn stop" id="btnStop">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
                Stop
            </button>
        </div>

        <!-- Status indicator -->
        <div class="status-indicator">
            <span class="status-dot-sm" id="robotCommandDot"></span>
            <span id="robotCommandText">Idle</span>
        </div>

        <!-- Robot status badge -->
        <div class="robot-badge" id="robotBadge">
            <span class="badge-dot-sm"></span>
            <span id="robotStatusText">Loading...</span>
        </div>
    </main>
</div>

</body>
</html>
