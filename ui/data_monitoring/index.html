<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Monitoring — Prometheus BCI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="assets/css/shared.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/prometheus.css">
    <link rel="stylesheet" href="assets/css/pipeline-viz.css">
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="assets/js/nav-sidebar.js"></script>
    <script src="assets/js/app-footer.js"></script>
    <script src="assets/js/brain3d.js"></script>
    <script defer src="/common/assets/js/timeflux.js"></script>
    <script defer src="assets/js/pipeline-viz.js"></script>
    <script defer src="assets/js/app.js"></script>
    <script type="text/javascript" src="assets/js/smoothie.js"></script>
</head>
<body>

<div class="app-layout">
    <nav-sidebar active="/dashboard"></nav-sidebar>

    <!-- Main content -->
    <main class="main-content">
        <!-- Decorative ambient glows -->
        <div style="position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;overflow:hidden;z-index:0;">
            <div style="position:absolute;width:600px;height:600px;top:-200px;left:-100px;background:radial-gradient(circle,rgba(34,211,238,0.06) 0%,transparent 70%);"></div>
            <div style="position:absolute;width:500px;height:500px;bottom:-150px;right:-100px;background:radial-gradient(circle,rgba(6,182,212,0.05) 0%,transparent 70%);"></div>
            <div style="position:absolute;width:400px;height:400px;top:40%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(167,139,250,0.04) 0%,transparent 70%);"></div>
        </div>
        <header class="page-header">
            <div>
                <h1 class="page-title">Data Monitoring</h1>
                <p class="page-description">Real-time EEG signal acquisition and recording</p>
            </div>
            <div class="header-badge">
                <span class="badge-dot"></span>
                <span class="badge-label" id="recordingStatus">Idle</span>
            </div>
        </header>

        <!-- Controls -->
        <div class="controls-bar">
            <button class="btn-control btn-record" id="startButton">
                <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><circle cx="12" cy="12" r="6"/></svg>
                Record
            </button>
            <button class="btn-control btn-stop" id="stopButton">
                <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
                Stop
            </button>
            <button class="btn-control btn-marker" id="markButton">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M12 2v20M2 12h20"/></svg>
                Marker
            </button>
        </div>

        <!-- Cortical Activity -->
        <section class="panel" style="flex: none;">
            <div class="panel-header">
                <h2 class="panel-title">Cortical Activity</h2>
                <span class="panel-badge">Live</span>
                <div class="brain3d-band-picker" id="bandPicker">
                    <button class="band-btn active" data-band="all">All</button>
                    <button class="band-btn" data-band="delta" style="--bc:#3350c0;">δ</button>
                    <button class="band-btn" data-band="theta" style="--bc:#33a6cc;">θ</button>
                    <button class="band-btn" data-band="alpha" style="--bc:#40bf5a;">α</button>
                    <button class="band-btn" data-band="beta" style="--bc:#d95933;">β</button>
                    <button class="band-btn" data-band="gamma" style="--bc:#e6cc26;">γ</button>
                </div>
            </div>
            <div class="panel-body">
                <div id="brain3dContainer" class="brain3d-canvas"></div>
                <div class="brain3d-legend">
                    <span class="legend-item"><span class="legend-dot" style="background:#3350c0;"></span>Delta</span>
                    <span class="legend-item"><span class="legend-dot" style="background:#33a6cc;"></span>Theta</span>
                    <span class="legend-item"><span class="legend-dot" style="background:#40bf5a;"></span>Alpha</span>
                    <span class="legend-item"><span class="legend-dot" style="background:#d95933;"></span>Beta</span>
                    <span class="legend-item"><span class="legend-dot" style="background:#e6cc26;"></span>Gamma</span>
                </div>
            </div>
        </section>

        <!-- Pipeline Visualization -->
        <section class="panel">
            <div class="panel-header">
                <h2 class="panel-title">Pipeline — Sources & Metrics</h2>
                <span class="panel-badge">Live</span>
            </div>
            <div class="panel-body" id="pipelineViz"></div>
        </section>

        <!-- EEG Raw Signal -->
        <section class="panel" style="flex: none; min-height: 280px;">
            <div class="panel-header">
                <h2 class="panel-title">EEG — Raw Signal</h2>
                <span class="panel-badge">Live</span>
            </div>
            <div class="panel-body" id="eegChartsContainer">
                <div class="empty-state" id="emptyStateEeg">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" width="48" height="48"><path d="M2 12h4l3-9 4 18 3-9h6"/></svg>
                    <p>Waiting for EEG data stream...</p>
                </div>
            </div>
        </section>

            <app-footer></app-footer>
    </main>
</div>

</body>
</html>
