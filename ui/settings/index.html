<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings — Prometheus BCI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="assets/css/shared.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/settings.css">
    <script src="assets/js/nav-sidebar.js"></script>
    <script src="assets/js/app-footer.js"></script>
    <script defer src="/common/assets/js/timeflux.js"></script>
    <script defer src="assets/js/app.js"></script>
</head>
<body>

<div class="app-layout">
    <nav-sidebar active="/settings"></nav-sidebar>

    <main class="main-content">
        <header class="page-header">
            <div>
                <h1 class="page-title">Settings</h1>
                <p class="page-description">Session configuration — changes apply on next restart</p>
            </div>
            <div class="header-badge">
                <span class="badge-dot"></span>
                <span class="badge-label" id="configStatus">Read-only</span>
            </div>
        </header>

        <div class="settings-scroll">

            <!-- Headset Picker -->
            <section class="settings-section" id="sectionHeadset">
                <div class="section-header" data-toggle="headset">
                    <span class="section-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M9 1v3M15 1v3M9 20v3M15 20v3M1 9h3M1 15h3M20 9h3M20 15h3"/></svg>
                    </span>
                    <h2 class="section-title">EEG Headset</h2>
                    <span class="section-value" id="headsetValue">—</span>
                    <span class="section-chevron">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
                    </span>
                </div>
                <div class="section-body" id="bodyHeadset">
                    <div class="headset-grid" id="headsetGrid"></div>
                    <div class="headset-expander" id="headsetExpander">
                        <button class="headset-expander-toggle" id="expanderToggle">
                            <span class="exp-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 1 1 7.072 0l-.548.547A3.374 3.374 0 0 0 14 18.469V19a2 2 0 1 1-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
                            </span>
                            <span class="exp-label">Experimental devices</span>
                            <span class="exp-badge" id="expanderCount"></span>
                            <span class="exp-chevron">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
                            </span>
                        </button>
                        <div class="headset-expander-body" id="expanderBody">
                            <div class="headset-grid" id="headsetGridExp"></div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Config Sections — generated by JS -->
            <div id="configSections"></div>

            <!-- Actions -->
            <div class="settings-actions">
                <button class="btn-glass" id="btnReset">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    Reset Defaults
                </button>
                <button class="btn-glass btn-primary" id="btnSave">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                    Save Configuration
                </button>
                <button class="btn-glass btn-restart" id="btnRestart">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
                    Restart Timeflux
                </button>
            </div>

        </div>

        <app-footer></app-footer>
    </main>
</div>

<!-- Toast -->
<div class="toast-container" id="toast">
    <span class="toast-icon"></span>
    <span class="toast-text"></span>
</div>

</body>
</html>
