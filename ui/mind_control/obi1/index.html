<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mind Keyboard — Prometheus BCI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="assets/css/shared.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/prometheus.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/simple-keyboard@latest/build/css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/awesomplete/1.1.5/awesomplete.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/awesomplete/1.1.5/awesomplete.min.js"></script>
    <script type="text/javascript" src="assets/js/smoothie.js"></script>
    <script src="assets/js/nav-sidebar.js"></script>
    <script defer src="/common/assets/js/timeflux.js"></script>
    <script defer src="assets/js/app.js"></script>
</head>
<body>

<div class="app-layout">
    <nav-sidebar active="/obi1"></nav-sidebar>

    <!-- Main content -->
    <main class="main-content">
        <header class="page-header">
            <div>
                <h1 class="page-title">Mind Keyboard</h1>
                <p class="page-description">BCI-decoded virtual keyboard with autocomplete</p>
            </div>
            <div class="header-badge">
                <span class="badge-dot"></span>
                <span class="badge-label">OBI1</span>
            </div>
        </header>

        <!-- Keyboard Panel -->
        <section class="panel keyboard-panel">
            <div class="panel-header">
                <h2 class="panel-title">Virtual Keyboard</h2>
                <span class="panel-badge">Live</span>
            </div>
            <div class="panel-body">
                <input class="keyboard-input" id="autocomplete-input" placeholder="Tap on the virtual keyboard to start" />
                <div class="simple-keyboard"></div>
            </div>
        </section>

        <!-- Audio Signal Panel -->
        <section class="panel audio-panel">
            <div class="panel-header">
                <h2 class="panel-title">Audio Signal</h2>
                <span class="panel-badge">Stream</span>
            </div>
            <div class="panel-body">
                <canvas id="audioChart"></canvas>
            </div>
        </section>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/simple-keyboard@latest/build/index.js"></script>
<script src="assets/js/keyboard.js"></script>

</body>
</html>
