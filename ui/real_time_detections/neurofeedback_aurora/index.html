<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora — Prometheus BCI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="assets/css/shared.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/prometheus.css">
    <link rel="stylesheet" href="assets/css/neurofeedback.css">
    <script src="assets/js/nav-sidebar.js"></script>
    <script src="assets/js/app-footer.js"></script>
    <script defer src="/common/assets/js/timeflux.js"></script>
    <script defer src="assets/js/app.js"></script>
</head>
<body>

<div class="app-layout">
    <nav-sidebar active="/neurofeedback_aurora"></nav-sidebar>

    <main class="main-content nfb-main">
        <header class="page-header nfb-header">
            <div>
                <h1 class="page-title">Aurora</h1>
                <p class="page-description">Northern lights driven by multimodal cognitive metrics</p>
            </div>
            <div class="header-badge">
                <span class="badge-dot"></span>
                <span class="badge-label" id="streamStatus">Idle</span>
            </div>
        </header>

        <div class="nfb-canvas-wrapper">
            <canvas id="nfbCanvas"></canvas>

            <div class="nfb-metrics-overlay">
                <div class="nfb-metric" data-metric="attention">
                    <svg viewBox="0 0 36 36" class="nfb-ring">
                        <circle cx="18" cy="18" r="15.9" class="nfb-ring-bg"/>
                        <circle cx="18" cy="18" r="15.9" class="nfb-ring-fill" id="ring-attention"/>
                    </svg>
                    <div class="nfb-metric-inner">
                        <span class="nfb-metric-value" id="val-attention">—</span>
                        <span class="nfb-metric-label">Focus</span>
                    </div>
                </div>
                <div class="nfb-metric" data-metric="arousal">
                    <svg viewBox="0 0 36 36" class="nfb-ring">
                        <circle cx="18" cy="18" r="15.9" class="nfb-ring-bg"/>
                        <circle cx="18" cy="18" r="15.9" class="nfb-ring-fill" id="ring-arousal"/>
                    </svg>
                    <div class="nfb-metric-inner">
                        <span class="nfb-metric-value" id="val-arousal">—</span>
                        <span class="nfb-metric-label">Energy</span>
                    </div>
                </div>
                <div class="nfb-metric" data-metric="stress">
                    <svg viewBox="0 0 36 36" class="nfb-ring">
                        <circle cx="18" cy="18" r="15.9" class="nfb-ring-bg"/>
                        <circle cx="18" cy="18" r="15.9" class="nfb-ring-fill" id="ring-stress"/>
                    </svg>
                    <div class="nfb-metric-inner">
                        <span class="nfb-metric-value" id="val-stress">—</span>
                        <span class="nfb-metric-label">Calm</span>
                    </div>
                </div>
                <div class="nfb-metric" data-metric="cognitive">
                    <svg viewBox="0 0 36 36" class="nfb-ring">
                        <circle cx="18" cy="18" r="15.9" class="nfb-ring-bg"/>
                        <circle cx="18" cy="18" r="15.9" class="nfb-ring-fill" id="ring-cognitive"/>
                    </svg>
                    <div class="nfb-metric-inner">
                        <span class="nfb-metric-value" id="val-cognitive">—</span>
                        <span class="nfb-metric-label">Load</span>
                    </div>
                </div>
            </div>

            <div class="nfb-state-label" id="brainState">Awaiting signal...</div>
        </div>

        <app-footer></app-footer>
    </main>
</div>

</body>
</html>
