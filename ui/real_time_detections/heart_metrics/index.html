<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Activity — Prometheus BCI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="assets/css/shared.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/prometheus.css">
    <script src="assets/js/nav-sidebar.js"></script>
    <script src="assets/js/app-footer.js"></script>
    <script defer src="/common/assets/js/timeflux.js"></script>
    <script defer src="assets/js/app.js"></script>
    <script type="text/javascript" src="assets/js/smoothie.js"></script>
    <style>
        /* Page-specific: scrollable content grid */
        .content-grid {
            padding: 24px 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex: 1;
            overflow-y: auto;
        }
        .content-grid::-webkit-scrollbar { width: 6px; }
        .content-grid::-webkit-scrollbar-track { background: transparent; }
        .content-grid::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 3px; }

        /* Hero metric card — glass */
        .hero-metric {
            background: var(--bg-raised);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 28px 32px;
            display: flex;
            align-items: center;
            gap: 24px;
            box-shadow: var(--glass-shadow);
            position: relative;
            overflow: hidden;
        }
        .hero-metric::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(239, 68, 68, 0.3), transparent);
            z-index: 1;
        }
        .hero-metric-icon {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-md);
            background: var(--red-dim);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border: 1px solid rgba(239, 68, 68, 0.15);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.1);
        }
        .hero-metric-icon svg {
            width: 28px;
            height: 28px;
            color: var(--red);
        }
        .hero-metric-body {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .hero-metric-label {
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-tertiary);
            font-family: var(--font-mono);
        }
        .hero-metric-value {
            font-size: 42px;
            font-weight: 300;
            font-family: var(--font-mono);
            color: var(--red);
            letter-spacing: -0.03em;
            line-height: 1.1;
            text-shadow: 0 0 24px rgba(239, 68, 68, 0.15);
        }
        .hero-metric-unit {
            font-size: 16px;
            color: var(--text-tertiary);
            margin-left: 6px;
        }

        /* Small metrics row */
        .metrics-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .content-grid .metrics-grid {
            grid-template-columns: repeat(4, 1fr);
        }

        /* Chart panels — no flex:1, size to content */
        .panel--chart {
            margin: 0;
            flex: none;
        }
        .panel--chart canvas {
            width: 100% !important;
            height: 160px !important;
            display: block;
        }

        /* HRV dynamic charts */
        .hrv-charts-container canvas {
            width: 100% !important;
            height: 100px !important;
            display: block;
            margin-bottom: 8px;
            border-radius: var(--radius-sm);
        }
    </style>
</head>
<body>

<div class="app-layout">
    <nav-sidebar active="/heart_metrics"></nav-sidebar>

    <!-- Main content -->
    <main class="main-content">
        <header class="page-header">
            <div>
                <h1 class="page-title">Heart Activity</h1>
                <p class="page-description">PPG signal, heart rate and cardiovascular metrics</p>
            </div>
            <div class="header-badge">
                <span class="badge-dot"></span>
                <span class="badge-label">Live</span>
            </div>
        </header>

        <div class="content-grid">
            <!-- Hero: Heart Rate BPM -->
            <div class="hero-metric">
                <div class="hero-metric-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z"/></svg>
                </div>
                <div class="hero-metric-body">
                    <span class="hero-metric-label">Heart Rate</span>
                    <div>
                        <span class="hero-metric-value" id="heart_rate_value">--</span>
                        <span class="hero-metric-unit">BPM</span>
                    </div>
                </div>
            </div>

            <!-- Metric cards -->
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-label">Stress</div>
                    <div class="metric-value" id="stress_value" style="color: var(--red);">—<span class="metric-unit">%</span></div>
                    <div class="metric-bar-track">
                        <div class="metric-bar-fill stress" id="stress_bar" style="width: 0%;"></div>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Cognitive Load</div>
                    <div class="metric-value" id="cognitive_value" style="color: #a78bfa;">—<span class="metric-unit">%</span></div>
                    <div class="metric-bar-track">
                        <div class="metric-bar-fill cognitive" id="cognitive_bar" style="width: 0%;"></div>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Attention</div>
                    <div class="metric-value" id="attention_value" style="color: var(--accent);">—<span class="metric-unit">%</span></div>
                    <div class="metric-bar-track">
                        <div class="metric-bar-fill attention" id="attention_bar" style="width: 0%;"></div>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Arousal</div>
                    <div class="metric-value" id="arousal_value" style="color: var(--amber);">—<span class="metric-unit">%</span></div>
                    <div class="metric-bar-track">
                        <div class="metric-bar-fill arousal" id="arousal_bar" style="width: 0%;"></div>
                    </div>
                </div>
            </div>

            <!-- Heart Rate Chart -->
            <section class="panel panel--chart">
                <div class="panel-header">
                    <h2 class="panel-title">Heart Rate</h2>
                    <span class="panel-badge">Live</span>
                </div>
                <div class="panel-body">
                    <canvas id="HRChart"></canvas>
                </div>
            </section>

            <!-- PPG Filtered Signal -->
            <section class="panel panel--chart">
                <div class="panel-header">
                    <h2 class="panel-title">PPG — Filtered Signal</h2>
                    <span class="panel-badge">Live</span>
                </div>
                <div class="panel-body">
                    <canvas id="ppgChart"></canvas>
                </div>
            </section>

            <!-- Metrics Time Series -->
            <section class="panel panel--chart">
                <div class="panel-header">
                    <h2 class="panel-title">Metrics — Time Series</h2>
                    <span class="panel-badge">Live</span>
                </div>
                <div class="panel-body">
                    <canvas id="metricsChart"></canvas>
                    <div class="chart-legend">
                        <span class="legend-item"><span class="legend-dot" style="background:#c46060;"></span>Stress</span>
                        <span class="legend-item"><span class="legend-dot" style="background:#8b7db5;"></span>Cognitive Load</span>
                        <span class="legend-item"><span class="legend-dot" style="background:#7ab3bd;"></span>Attention</span>
                        <span class="legend-item"><span class="legend-dot" style="background:#c49545;"></span>Arousal</span>
                    </div>
                </div>
            </section>

            <!-- HRV Data -->
            <section class="panel panel--chart">
                <div class="panel-header">
                    <h2 class="panel-title">HRV Data</h2>
                    <span class="panel-badge">Live</span>
                </div>
                <div class="panel-body hrv-charts-container" id="hrv_data_Container">
                </div>
            </section>
        </div>
            <app-footer></app-footer>
    </main>
</div>

</body>
</html>
