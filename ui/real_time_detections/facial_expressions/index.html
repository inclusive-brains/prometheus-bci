<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facial Expressions — Prometheus BCI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="assets/css/shared.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/prometheus.css">
    <style>
        /* Webcam & Face Mesh — glass */
        .webcam-wrap {
            position: relative;
            display: inline-block;
            border-radius: var(--radius-md);
            overflow: hidden;
            background: var(--bg-root);
            border: 1px solid var(--border-subtle);
            box-shadow: var(--glass-shadow);
        }
        .webcam-wrap video,
        .webcam-wrap canvas {
            display: block;
        }
        .webcam-wrap canvas {
            position: absolute;
            left: 0;
            top: 0;
        }
        .btn-webcam {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 16px;
            border: 1px solid var(--border-default);
            border-radius: var(--radius-sm);
            background: var(--bg-raised);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: var(--text-secondary);
            font-family: var(--font-sans);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
            margin-bottom: 16px;
        }
        .btn-webcam:hover {
            background: var(--accent-dim);
            color: var(--accent);
            border-color: rgba(34, 211, 238, 0.3);
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.1);
        }
        /* Blend shapes list */
        .blend-shapes-list {
            list-style: none;
            padding: 0;
            margin: 16px 0 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 4px;
        }
        .blend-shapes-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
            font-size: 11px;
            font-family: var(--font-mono);
        }
        .blend-shapes-label {
            width: 160px;
            flex-shrink: 0;
            color: var(--text-tertiary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .blend-shapes-value {
            height: 6px;
            background: var(--accent);
            border-radius: 3px;
            min-width: 2px;
            opacity: 0.7;
            box-shadow: 0 0 6px rgba(34, 211, 238, 0.2);
        }
        /* Panel stacking — allow scroll */
        .panels-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }
        .panels-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .panels-scroll::-webkit-scrollbar-thumb {
            background: var(--border-default);
            border-radius: 3px;
        }
        .panels-scroll .panel {
            flex: none;
        }
    </style>
    <script src="assets/js/nav-sidebar.js"></script>
    <script defer src="/common/assets/js/timeflux.js"></script>
    <script defer src="assets/js/app.js"></script>
    <script defer src="assets/js/smoothie.js"></script>
    <script src="assets/mediapipe/camera_utils.js"></script>
    <script src="assets/mediapipe/control_utils.js"></script>
    <script src="assets/mediapipe/drawing_utils.js"></script>
    <script src="assets/mediapipe/face_mesh.js"></script>
    <script src="assets/mediapipe/vision_bundle.js" crossorigin="anonymous"></script>
</head>
<body>

<div class="app-layout">
    <nav-sidebar active="/facial_expressions"></nav-sidebar>

    <!-- Main content -->
    <main class="main-content">
        <header class="page-header">
            <div>
                <h1 class="page-title">Facial Expressions</h1>
                <p class="page-description">Face mesh detection and emotion analysis</p>
            </div>
            <div class="header-badge">
                <span class="badge-dot"></span>
                <span class="badge-label">Live</span>
            </div>
        </header>

        <div class="panels-scroll">
            <!-- Face Mesh Panel -->
            <section class="panel" id="demos">
                <div class="panel-header">
                    <h2 class="panel-title">Face Mesh</h2>
                    <span class="panel-badge">Webcam</span>
                </div>
                <div class="panel-body">
                    <button id="webcamButton" class="btn-webcam">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="14" height="14"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
                        Enable Webcam
                    </button>
                    <div class="webcam-wrap">
                        <video id="webcam" autoplay playsinline></video>
                        <canvas id="output_canvas"></canvas>
                    </div>
                    <div class="blend-shapes">
                        <ul class="blend-shapes-list" id="video-blend-shapes"></ul>
                    </div>
                </div>
            </section>

            <!-- Facial Metrics Panel -->
            <section class="panel">
                <div class="panel-header">
                    <h2 class="panel-title">Facial Metrics</h2>
                    <span class="panel-badge">Live</span>
                </div>
                <div class="panel-body" id="facialMetricsContainer">
                    <div class="empty-state" id="metricsEmptyState">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" width="48" height="48"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
                        <p>Waiting for facial metrics data...</p>
                    </div>
                </div>
            </section>

            <!-- Facial Blendshapes Panel -->
            <section class="panel">
                <div class="panel-header">
                    <h2 class="panel-title">Facial Blendshapes</h2>
                    <span class="panel-badge">Live</span>
                </div>
                <div class="panel-body" id="facialBlendshapesContainer">
                    <div class="empty-state" id="blendshapesEmptyState">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" width="48" height="48"><path d="M2 12h4l3-9 4 18 3-9h6"/></svg>
                        <p>Waiting for blendshapes data...</p>
                    </div>
                </div>
            </section>

            <!-- Facial Emotions Panel -->
            <section class="panel">
                <div class="panel-header">
                    <h2 class="panel-title">Facial Emotions</h2>
                    <span class="panel-badge">Live</span>
                </div>
                <div class="panel-body" id="facialEmotionsContainer">
                    <div class="empty-state" id="emotionsEmptyState">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" width="48" height="48"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z"/></svg>
                        <p>Waiting for emotion data...</p>
                    </div>
                </div>
            </section>
        </div>
    </main>
</div>

<script type="module">
    // Copyright 2023 The MediaPipe Authors.
    // Licensed under the Apache License, Version 2.0

    import vision from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";
    const { FaceLandmarker, FilesetResolver, DrawingUtils } = vision;
    const demosSection = document.getElementById("demos");
    const videoBlendShapes = document.getElementById("video-blend-shapes");

    let faceLandmarker;
    let runningMode = "IMAGE";
    let enableWebcamButton;
    let webcamRunning = false;
    const videoWidth = 480;

    async function createFaceLandmarker() {
      const filesetResolver = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
      );
      faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
        baseOptions: {
          modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`,
          delegate: "GPU"
        },
        outputFaceBlendshapes: true,
        runningMode,
        numFaces: 2
      });
    }
    createFaceLandmarker();

    const video = document.getElementById("webcam");
    const canvasElement = document.getElementById("output_canvas");
    const canvasCtx = canvasElement.getContext("2d");

    function hasGetUserMedia() {
      return !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
    }

    if (hasGetUserMedia()) {
      enableWebcamButton = document.getElementById("webcamButton");
      if (enableWebcamButton instanceof HTMLButtonElement) {
        enableWebcamButton.addEventListener("click", enableCam);
      }
    }

    function enableCam(event) {
      if (!faceLandmarker) {
        console.log("Wait! faceLandmarker not loaded yet.");
        return;
      }

      if (webcamRunning === true) {
        webcamRunning = false;
        enableWebcamButton.textContent = "Enable Webcam";
      } else {
        webcamRunning = true;
        enableWebcamButton.textContent = "Disable Webcam";
      }

      const constraints = { video: true };
      navigator.mediaDevices.getUserMedia(constraints).then((stream) => {
        video.srcObject = stream;
        video.addEventListener("loadeddata", predictWebcam);
      });
    }

    let lastVideoTime = -1;
    let results = undefined;
    const drawingUtils = new DrawingUtils(canvasCtx);

    async function predictWebcam() {
      const radio = video.videoHeight / video.videoWidth;
      video.style.width = videoWidth + "px";
      video.style.height = videoWidth * radio + "px";
      canvasElement.style.width = videoWidth + "px";
      canvasElement.style.height = videoWidth * radio + "px";
      canvasElement.width = video.videoWidth;
      canvasElement.height = video.videoHeight;

      if (runningMode === "IMAGE") {
        runningMode = "VIDEO";
        await faceLandmarker.setOptions({ runningMode: runningMode });
      }
      let startTimeMs = performance.now();
      if (lastVideoTime !== video.currentTime) {
        lastVideoTime = video.currentTime;
        results = faceLandmarker.detectForVideo(video, startTimeMs);
      }
      if (results.faceLandmarks) {
        for (const landmarks of results.faceLandmarks) {
          drawingUtils.drawConnectors(landmarks, FaceLandmarker.FACE_LANDMARKS_TESSELATION, { color: "#22d3ee30", lineWidth: 1 });
          drawingUtils.drawConnectors(landmarks, FaceLandmarker.FACE_LANDMARKS_RIGHT_EYE, { color: "#22d3ee" });
          drawingUtils.drawConnectors(landmarks, FaceLandmarker.FACE_LANDMARKS_RIGHT_EYEBROW, { color: "#22d3ee" });
          drawingUtils.drawConnectors(landmarks, FaceLandmarker.FACE_LANDMARKS_LEFT_EYE, { color: "#22d3ee" });
          drawingUtils.drawConnectors(landmarks, FaceLandmarker.FACE_LANDMARKS_LEFT_EYEBROW, { color: "#22d3ee" });
          drawingUtils.drawConnectors(landmarks, FaceLandmarker.FACE_LANDMARKS_FACE_OVAL, { color: "#22d3ee80" });
          drawingUtils.drawConnectors(landmarks, FaceLandmarker.FACE_LANDMARKS_LIPS, { color: "#22d3ee" });
          drawingUtils.drawConnectors(landmarks, FaceLandmarker.FACE_LANDMARKS_RIGHT_IRIS, { color: "#22d3ee" });
          drawingUtils.drawConnectors(landmarks, FaceLandmarker.FACE_LANDMARKS_LEFT_IRIS, { color: "#22d3ee" });
        }
      }
      drawBlendShapes(videoBlendShapes, results.faceBlendshapes);

      if (webcamRunning === true) {
        window.requestAnimationFrame(predictWebcam);
      }
    }

    function drawBlendShapes(el, blendShapes) {
        if (!blendShapes.length) {
            return;
        }

        let htmlMaker = "";
        blendShapes[0].categories.forEach((shape) => {
            htmlMaker += `
              <li class="blend-shapes-item">
                <span class="blend-shapes-label">${shape.displayName || shape.categoryName}</span>
                <span class="blend-shapes-value" style="width: calc(${(+shape.score * 100).toFixed(4)}% - 120px)">${(+shape.score).toFixed(4)}</span>
              </li>
            `;
        });

        el.innerHTML = htmlMaker;
    }
</script>

</body>
</html>
